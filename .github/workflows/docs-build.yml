name: Documentation Build

on:
  push:
    branches: [ master ]
  pull_request:
    types: [opened, synchronize, reopened, closed]

# Note: GitHub Pages must be configured to deploy from branch 'gh-pages' (root).
# Go to Settings > Pages > Source and select 'Deploy from a branch', then
# choose 'gh-pages' branch and '/ (root)' folder.
permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    concurrency: preview-${{ github.ref }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        if: github.event.action != 'closed'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install documentation dependencies
        if: github.event.action != 'closed'
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
      - name: Generate benchmark docs
        if: github.event.action != 'closed'
        run: |
          python generate_benchmark_docs.py
      - name: Build documentation
        if: github.event.action != 'closed'
        env:
          MKDOCS_GIT_COMMITTERS_APIKEY: ${{ github.token }}
        run: |
          mkdocs build --strict
      - name: Deploy to GitHub Pages (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./site
          clean: true
          clean-exclude: pr-preview
      - name: Deploy PR preview / cleanup
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./site/
