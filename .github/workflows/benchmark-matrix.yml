name: Benchmark Matrix

on:
  workflow_dispatch:

jobs:
  benchmark:
    name: Benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark
        run: |
          mkdir -p benchmark-results
          python benchmark.py --duration 5 --comment "GitHub actions benchmark run on ${{ matrix.os }} (run ${{ github.run_id }})" --output "benchmark-results/benchmark_${{ matrix.os }}_${{ github.run_id }}.json"

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.os }}
          path: benchmark-results/benchmark_${{ matrix.os }}_${{ github.run_id }}.json
          if-no-files-found: error
